# Run manually from the Actions tab to get the Linux MCPB SHA-256 before you tag a release.
# Paste that value into server.json packages[0].fileSha256 so the Release workflow and
# mcp-publisher validate against the official MCP registry.
name: MCP registry preflight (Linux MCPB hash)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux_mcpb_sha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Pack MCP bundle (Linux)
        run: uv run python scripts/build_mcpb.py

      - name: Print SHA-256 for server.json
        run: |
          echo "### Linux MCPB SHA-256" >> "$GITHUB_STEP_SUMMARY"
          echo "Copy this hex into \`server.json\` → \`packages[0].fileSha256\` before tagging." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          sha256sum dist/batch-review-mcp-*.mcpb | tee -a "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Also ensure \`packages[0].identifier\` uses the tag you will push (e.g. \`.../releases/download/v0.3.0/batch-review-mcp-0.3.0.mcpb\`) and that \`pyproject.toml\` / \`server.json\` \`version\` match the tag without the leading \`v\`."
