# When a version tag like v0.1.0 is pushed: build wheel/sdist + MCPB, verify MCP registry
# metadata (server.json identifier + fileSha256 vs Linux-built .mcpb), create a GitHub
# Release with generated notes and attach artifacts, publish the server to the MCP Registry
# via GitHub Actions OIDC, then optionally publish to PyPI.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to release manually (for reruns/recovery), e.g. v0.3.2
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      SOURCE_DIR: ${{ github.event_name == 'workflow_dispatch' && 'tag-src' || '.' }}
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout workflow revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || env.RELEASE_TAG }}

      - name: Checkout tagged release source
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
          path: tag-src

      - name: Overlay current release metadata onto tagged source
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: cp server.json "$SOURCE_DIR/server.json"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd "$SOURCE_DIR/frontend"
          npm ci
          npm run build

      - name: Build Python wheel and sdist
        run: |
          cd "$SOURCE_DIR"
          uv build

      - name: Pack MCP bundle
        run: uv run --no-project python scripts/build_mcpb.py --repo-root "$SOURCE_DIR"

      - name: Update server.json MCPB SHA from Linux build
        run: uv run --no-project python scripts/update_server_json_mcpb_sha.py --repo-root "$SOURCE_DIR" --tag "$RELEASE_TAG"

      - name: List release artifacts
        run: |
          ls -la "$SOURCE_DIR/dist/"
          sha256sum "$SOURCE_DIR"/dist/*

      - name: Verify server.json for MCP registry (MCPB URL + SHA-256)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run --no-project python scripts/verify_release_mcp_registry.py --repo-root "$SOURCE_DIR" --tag "$RELEASE_TAG"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ env.SOURCE_DIR }}/dist/*.mcpb
            ${{ env.SOURCE_DIR }}/dist/*.whl
            ${{ env.SOURCE_DIR }}/dist/*.tar.gz

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x ./mcp-publisher

      - name: Authenticate to MCP Registry via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish "$SOURCE_DIR/server.json"

      - name: Publish to PyPI
        if: ${{ env.UV_PUBLISH_TOKEN != '' }}
        run: |
          cd "$SOURCE_DIR"
          uv publish
