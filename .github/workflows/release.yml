# When a version tag like v0.1.0 is pushed: build wheel/sdist + MCPB, verify MCP registry
# metadata (server.json identifier + fileSha256 vs Linux-built .mcpb), create a GitHub
# Release with generated notes and attach artifacts, then optionally publish to PyPI.
#
# Before tagging: run workflow "MCP registry preflight (Linux MCPB hash)", update
# server.json, commit, then tag — otherwise this workflow fails on the verify step.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to release manually (for reruns/recovery), e.g. v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Python wheel and sdist
        run: uv build

      - name: Pack MCP bundle
        run: uv run python scripts/build_mcpb.py

      - name: List release artifacts
        run: |
          ls -la dist/
          sha256sum dist/*

      - name: Verify server.json for MCP registry (MCPB URL + SHA-256)
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/verify_release_mcp_registry.py

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/*.mcpb
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        if: ${{ env.UV_PUBLISH_TOKEN != '' }}
        run: uv publish
